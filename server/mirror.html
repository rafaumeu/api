<html>

<head>
	<title>Server LouvorJA</title>

	<style>
		html,
		body {
			padding: 0;
			margin: 0;
			font-family: "Open Sans", Verdana, Arial, Helvetica, sans-serif;
			font-size: 13px;
			color: #000;
		}

		.retorno {
			background: #111;
		}

		.quadro {
			background-color: rgba(0, 0, 0, 0.75);
			padding: 10px 40px;
			color: #FFF;
			font-weight: bold;
			transition: opacity 600ms, visibility 600ms;
			display: flex;
			justify-content: center;
			align-content: center;
			flex-direction: column;
		}

		.capa {
			color: #efb400;
		}

		.letra {
			color: #FFF;
		}

		.transmissao #quadro {
			font-size: 25px;
			min-height: 70px;
		}

		.retorno #quadro {
			font-size: 10vh;
		}

		.retorno .prox_letra {
			font-size: 8vh;
			color: #000;
			background-color: rgba(255, 255, 255, 0.75);
			margin-top: 5px;
			padding-top: 5px;
		}

		.biblia_texto {
			color: #FFF;
		}

		.biblia_info {
			color: #FFFFFF;
			text-align: right;
			font-style: italic;
		}
	</style>

</head>

<body>

	<table cellspacing=0 cellpadding=0 width="100%" height="100%" id="body">
		<tr>
			<td style="text-align:center">
				<div id="quadro" class="quadro" style="opacity:0;"></div>
			</td>
		</tr>
	</table>


	<script>
		var acao = (window.location.search.substring(1));
		if (acao == "") {
			acao = "transmissao";
		}
		var page = window.location.pathname.replace(/\//g, "");
		var tmrtxt = 0;

		function parseINIString(data) {
			var regex = {
				section: /^\s*\[\s*([^\]]*)\s*\]\s*$/,
				param: /^\s*([^=]+?)\s*=\s*(.*?)\s*$/,
				comment: /^\s*;.*$/
			};
			var value = {};
			var lines = data.split(/[\r\n]+/);
			var section = null;
			lines.forEach(function (line) {
				if (regex.comment.test(line)) {
					return;
				} else if (regex.param.test(line)) {
					var match = line.match(regex.param);
					if (section) {
						value[section][match[1]] = match[2];
					} else {
						value[match[1]] = match[2];
					}
				} else if (regex.section.test(line)) {
					var match = line.match(regex.section);
					value[match[1]] = {};
					section = match[1];
				} else if (line.length == 0 && section) {
					section = null;
				};
			});
			return value;
		}

		function carrega_dados() {
			lerArquivo("file/file.ja", executaArquivo);
		}

		function lerArquivo(nome, callback) {
			try {
				var req = new XMLHttpRequest();
				req.open("GET", nome, false);
				req.onreadystatechange = function () {
					callback(req.responseText);
				}
				req.send(null);
			} catch (e) {
				console.log(e);
			}
		}

		function executaArquivo(conteudo) {
			data = parseINIString(conteudo);
			conteudo = "";

			if (page == "musica") {
				data.MUSICA = (data.MUSICA == undefined ? data : data.MUSICA);
				data.MUSICA.letra = (data.MUSICA.letra == undefined ? "" : data.MUSICA.letra);
				data.MUSICA.letra = data.MUSICA.letra.replace(/\|/g, "<br>");
				conteudo += (data.MUSICA.letra != "" ? "<span class='" + data.MUSICA.class + "'>" + data.MUSICA.letra + "</span>" : "");
				if (acao == "retorno") {
					data.MUSICA.letra_prox = (data.MUSICA.letra_prox == undefined ? "" : data.MUSICA.letra_prox);
					data.MUSICA.letra_prox = data.MUSICA.letra_prox.replace(/\|/g, "<br>");
					conteudo += (data.MUSICA.letra_prox != "" ? "<span class='prox_letra'>" + data.MUSICA.letra_prox + "</span>" : "");
				}
			}
			if (page == "biblia") {
				data.BIBLIA = (data.BIBLIA == undefined ? data : data.BIBLIA);
				data.BIBLIA.texto = (data.BIBLIA.texto == undefined ? "" : data.BIBLIA.texto);
				data.BIBLIA.texto = data.BIBLIA.texto.replace(/\|/g, "<br>");
				data.BIBLIA.info = (data.BIBLIA.info == undefined ? "" : data.BIBLIA.info);
				data.BIBLIA.info = data.BIBLIA.info.replace(/\|/g, "<br>");
				conteudo += (data.BIBLIA.texto != "" ? "<span class='biblia_texto'>" + data.BIBLIA.texto + "</span>" : "");
				conteudo += (data.BIBLIA.info != "" ? "<span class='biblia_info'>" + data.BIBLIA.info + "</span>" : "");
			}
			if (conteudo != "") {
				tmrtxt = 0;
				escreve("quadro", conteudo);
				show("quadro");
			} else {
				tmrtxt++;
				if (tmrtxt >= 5) {
					hide("quadro");
				}
			}
		}

		function show(id) {
			document.getElementById(id).style.opacity = 1;
		}
		function hide(id) {
			document.getElementById(id).style.opacity = 0;
		}
		function escreve(id, html) {
			document.getElementById(id).innerHTML = html;
		}
		function addClass(id, name) {
			document.getElementById(id).className += name;
		}

		window.onload = function () {
			addClass("body", acao);
			v_time = setInterval(carrega_dados, 500);
			carrega_dados();
		}

	</script>


</body>

</html>
