<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Página não encontrada</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #000;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;

            display: flex;
            align-items: center;
            justify-content: center;

            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .error-code {
            font-size: clamp(90px, 18vw, 220px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: 6px;
        }

        .title {
            margin-top: 20px;
            font-size: clamp(22px, 3vw, 36px);
            font-weight: 600;
        }

        .description {
            margin-top: 14px;
            color: #bdbdbd;
            font-size: 16px;
        }

        .button {
            display: inline-block;
            margin-top: 35px;
            padding: 14px 28px;

            border: 1px solid #fff;
            border-radius: 999px;

            color: #fff;
            text-decoration: none;
            font-weight: 600;

            transition: 0.25s ease;
        }

        .button:hover {
            background: #fff;
            color: #000;
        }

        .background-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }

        .background-glow.one {
            top: -120px;
            left: -120px;
        }

        .background-glow.two {
            bottom: -150px;
            right: -150px;
        }

        .container {
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>

    <div class="background-glow one"></div>
    <div class="background-glow two"></div>

    <div class="container">
        <div class="error-code">404</div>

        <h1 class="title">P&aacute;gina n&atilde;o encontrada</h1>

        <p class="description">
            A p&aacute;gina que voc&ecirc; tentou acessar n&atilde;o existe ou foi removida.
        </p>

        <a href="/" class="button">
            Voltar para o in&iacute;cio
        </a>
    </div>

</body>

</html>
